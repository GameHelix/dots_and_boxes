<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Dark background -->
  <rect width="32" height="32" rx="6" fill="#050510"/>
  <!-- Completed box fill -->
  <rect x="7" y="7" width="9" height="9" fill="rgba(0,245,255,0.2)" rx="1"/>
  <!-- Cyan lines (player 1) - completed box -->
  <line x1="7" y1="7" x2="16" y2="7" stroke="#00f5ff" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="7" y1="16" x2="16" y2="16" stroke="#00f5ff" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="7" y1="7" x2="7" y2="16" stroke="#00f5ff" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="16" y1="7" x2="16" y2="16" stroke="#00f5ff" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Pink lines (player 2) -->
  <line x1="16" y1="16" x2="25" y2="16" stroke="#ff00e5" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="16" y1="7" x2="25" y2="7" stroke="#ff00e5" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Ghost lines -->
  <line x1="7" y1="25" x2="16" y2="25" stroke="rgba(255,255,255,0.15)" stroke-width="1" stroke-linecap="round" stroke-dasharray="2 2"/>
  <line x1="16" y1="25" x2="25" y2="25" stroke="rgba(255,255,255,0.15)" stroke-width="1" stroke-linecap="round" stroke-dasharray="2 2"/>
  <line x1="25" y1="7" x2="25" y2="16" stroke="rgba(255,255,255,0.15)" stroke-width="1" stroke-linecap="round" stroke-dasharray="2 2"/>
  <line x1="25" y1="16" x2="25" y2="25" stroke="rgba(255,255,255,0.15)" stroke-width="1" stroke-linecap="round" stroke-dasharray="2 2"/>
  <line x1="7" y1="16" x2="7" y2="25" stroke="rgba(255,255,255,0.15)" stroke-width="1" stroke-linecap="round" stroke-dasharray="2 2"/>
  <line x1="16" y1="16" x2="16" y2="25" stroke="rgba(255,255,255,0.15)" stroke-width="1" stroke-linecap="round" stroke-dasharray="2 2"/>
  <!-- Dots -->
  <circle cx="7" cy="7" r="2" fill="white"/>
  <circle cx="16" cy="7" r="2" fill="white"/>
  <circle cx="25" cy="7" r="2" fill="white"/>
  <circle cx="7" cy="16" r="2" fill="white"/>
  <circle cx="16" cy="16" r="2" fill="white"/>
  <circle cx="25" cy="16" r="2" fill="white"/>
  <circle cx="7" cy="25" r="2" fill="white"/>
  <circle cx="16" cy="25" r="2" fill="white"/>
  <circle cx="25" cy="25" r="2" fill="white"/>
</svg>
